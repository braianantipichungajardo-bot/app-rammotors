<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>RAM Motors · Stock</title>
<style>
  :root{
    --rojo:#e50000;
    --bg:#141414;
    --card:#232323;
    --card2:#2b2b2b;
    --texto:#f2f2f2;
    --texto2:#9a9a9a;
    --borde:#3a3a3a;
    --verde:#4CAF50;
    --naranjo:#FF8C00;
    --azul:#2196F3;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--texto);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;height:100%;}
  body{padding-bottom:env(safe-area-inset-bottom);}
  #app{display:flex;flex-direction:column;height:100vh;}

  header{flex:0 0 auto;background:#1a1a1a;padding:14px 14px 10px;padding-top:calc(14px + env(safe-area-inset-top));border-bottom:2px solid var(--rojo);position:sticky;top:0;z-index:5;}
  header h1{margin:0 0 2px;font-size:19px;font-weight:800;letter-spacing:.3px;}
  header .sub{font-size:11.5px;color:var(--texto2);margin-bottom:10px;}

  .buscador{display:flex;gap:8px;margin-bottom:8px;}
  .buscador input{flex:1;background:var(--card);border:1px solid var(--borde);border-radius:10px;padding:10px 12px;color:var(--texto);font-size:15px;outline:none;}
  .buscador input::placeholder{color:var(--texto2);}
  .btn-icon{background:var(--card);border:1px solid var(--borde);border-radius:10px;padding:0 12px;color:var(--texto);font-size:16px;display:flex;align-items:center;justify-content:center;}

  .filtros-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
  .filtros-row::-webkit-scrollbar{display:none;}
  .filtros-row select{background:var(--card);border:1px solid var(--borde);border-radius:20px;padding:7px 10px;color:var(--texto);font-size:12.5px;white-space:nowrap;flex:0 0 auto;max-width:130px;}

  .precio-row{display:flex;gap:8px;margin-top:8px;}
  .precio-row input{width:100%;background:var(--card);border:1px solid var(--borde);border-radius:10px;padding:8px 10px;color:var(--texto);font-size:13px;}
  .precio-row span{color:var(--texto2);align-self:center;font-size:12px;}

  .conteo{font-size:12px;color:var(--texto2);margin-top:8px;}

  main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px;}
  #lista.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  #lista.list{display:flex;flex-direction:column;gap:10px;}

  .card{background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--borde);position:relative;}
  .grid .card .foto{height:110px;}
  .list .card{display:flex;}
  .list .card .foto{width:110px;height:110px;flex:0 0 auto;}
  .card .foto{background:#0e0e0e;position:relative;}
  .card .foto img{width:100%;height:100%;object-fit:cover;display:block;}
  .card .foto .sinfoto{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#555;font-size:11px;}
  .card .info{padding:8px 10px;flex:1;min-width:0;}
  .card .titulo{font-weight:700;font-size:13.5px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card .sub{font-size:11px;color:var(--texto2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card .precio{font-weight:800;font-size:15px;margin-top:6px;}
  .card .estado-badge{position:absolute;top:6px;left:6px;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:8px;background:rgba(0,0,0,.55);}
  .card .prop-badge{display:inline-block;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:6px;margin-top:5px;}
  .card .pub-row{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
  .card .pub-dot{font-size:9px;padding:2px 6px;border-radius:6px;color:#fff;font-weight:700;}

  .vacio{text-align:center;color:var(--texto2);padding:40px 10px;font-size:13px;}

  /* Detalle */
  #detalle{position:fixed;inset:0;background:var(--bg);z-index:20;display:none;flex-direction:column;}
  #detalle.abierto{display:flex;}
  #detalle .carrusel{position:relative;background:#000;flex:0 0 auto;height:42vh;overflow:hidden;}
  #detalle .carrusel .foto-actual{width:100%;height:100%;object-fit:contain;background:#000;}
  #detalle .carrusel .sinfoto{color:#555;display:flex;align-items:center;justify-content:center;height:100%;font-size:13px;}
  #detalle .cerrar{position:absolute;top:calc(10px + env(safe-area-inset-top));left:10px;background:rgba(0,0,0,.55);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;z-index:2;}
  #detalle .contador-fotos{position:absolute;bottom:8px;right:10px;background:rgba(0,0,0,.6);color:#fff;font-size:11px;padding:3px 8px;border-radius:10px;}
  #detalle .puntos{position:absolute;bottom:8px;left:0;right:0;display:flex;justify-content:center;gap:5px;}
  #detalle .puntos span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);}
  #detalle .puntos span.on{background:#fff;}

  #detalle .cuerpo{flex:1;overflow-y:auto;padding:16px;}
  #detalle h2{margin:0 0 4px;font-size:20px;}
  #detalle .sub{color:var(--texto2);font-size:13px;margin-bottom:12px;}
  #detalle .precio-grande{font-size:26px;font-weight:800;margin:6px 0 14px;}
  #detalle .specs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  #detalle .spec{background:var(--card);border-radius:10px;padding:9px 11px;}
  #detalle .spec .label{font-size:10px;color:var(--texto2);text-transform:uppercase;letter-spacing:.5px;}
  #detalle .spec .valor{font-size:14.5px;font-weight:700;margin-top:2px;}
  #detalle .badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
  #detalle .badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px;color:#fff;}

  ::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>RAM Motors <span style="color:var(--rojo)">·</span> Stock</h1>
    <div class="sub" id="fechaGenerado">Actualizado: —</div>
    <div class="buscador">
      <input id="buscar" type="search" placeholder="Buscar marca, modelo, patente...">
      <button class="btn-icon" id="btnVista" title="Cambiar vista">▦</button>
    </div>
    <div class="filtros-row">
      <select id="fMarca"><option value="">Marca: Todas</option></select>
      <select id="fCombustible"><option value="">Combustible: Todos</option></select>
      <select id="fTransmision"><option value="">Transmisión: Todas</option></select>
      <select id="fPropiedad">
        <option value="">Propiedad: Todas</option>
        <option value="propio">Propio</option>
        <option value="consignado">Consignado</option>
      </select>
      <select id="fOrden">
        <option value="precio_asc">Precio: menor a mayor</option>
        <option value="precio_desc">Precio: mayor a menor</option>
        <option value="alfabetico">Alfabético (A-Z)</option>
        <option value="km_asc">Kilometraje: menor a mayor</option>
        <option value="dias_desc">Más nuevos primero</option>
      </select>
    </div>
    <div class="precio-row">
      <input id="precioMin" type="number" inputmode="numeric" placeholder="Precio mín.">
      <span>—</span>
      <input id="precioMax" type="number" inputmode="numeric" placeholder="Precio máx.">
    </div>
    <div class="conteo" id="conteo"></div>
  </header>

  <main>
    <div id="lista" class="list"></div>
  </main>
</div>

<div id="detalle">
  <div class="carrusel" id="carrusel">
    <button class="cerrar" id="btnCerrar">✕</button>
    <div id="fotoWrap"></div>
    <div class="contador-fotos" id="contadorFotos"></div>
    <div class="puntos" id="puntos"></div>
  </div>
  <div class="cuerpo">
    <h2 id="dTitulo"></h2>
    <div class="sub" id="dSub"></div>
    <div class="badges" id="dBadges"></div>
    <div class="precio-grande" id="dPrecio"></div>
    <div class="specs" id="dSpecs"></div>
  </div>
</div>

<script>
// =====================================================
// DATOS (inyectados por el exportador de Python)
// =====================================================
const DATA = {"generado": "21-07-2026 15:31", "vehiculos": [{"id": "00012500000 - Toyota Corolla - ABCD12", "marca": "Toyota", "modelo": "Corolla", "version": "XEI 2.0", "patente": "ABCD12", "anio": 2022, "km": 35000, "combustible": "Gasolina", "transmision": "Automática", "precio": 12500000, "estado": "Disponible", "dias_stock": "120", "propiedad": null, "publicado": {"marketplace": false, "instagram": false, "facebook": false}, "fotos": []}]};

const PLATAFORMA_LABEL = {marketplace:"Marketplace", instagram:"Instagram", facebook:"Facebook"};
const PLATAFORMA_COLOR = {marketplace:"#0084C7", instagram:"#C13584", facebook:"#1877F2"};
const ESTADO_COLOR = {"Nuevo":"#FF8C00","Disponible":"#4CAF50","Cambio Precio":"#2196F3","ELIMINADO":"#f44336"};

let vehiculos = DATA.vehiculos || [];
let vista = localStorage.getItem('ram_vista') || 'list';
let detalleActual = null;
let fotoIndex = 0;
let touchStartX = null;

function fmtPrecio(n){
  n = Math.round(Number(n)||0);
  return "$" + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}
function fmtKm(n){
  n = Math.round(Number(n)||0);
  return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".") + " km";
}

function poblarSelect(id, valores){
  const sel = document.getElementById(id);
  const guardado = sel.value;
  [...new Set(valores.filter(v => v && String(v).trim() !== ""))].sort().forEach(v=>{
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  });
}

function initFiltros(){
  poblarSelect('fMarca', vehiculos.map(v=>v.marca));
  poblarSelect('fCombustible', vehiculos.map(v=>v.combustible));
  poblarSelect('fTransmision', vehiculos.map(v=>v.transmision));
}

function aplicarFiltros(){
  const texto = document.getElementById('buscar').value.trim().toUpperCase();
  const marca = document.getElementById('fMarca').value;
  const combustible = document.getElementById('fCombustible').value;
  const transmision = document.getElementById('fTransmision').value;
  const propiedad = document.getElementById('fPropiedad').value;
  const orden = document.getElementById('fOrden').value;
  const pMin = parseFloat(document.getElementById('precioMin').value) || 0;
  const pMax = parseFloat(document.getElementById('precioMax').value) || Infinity;

  let out = vehiculos.filter(v=>{
    if (texto){
      const hay = `${v.marca} ${v.modelo} ${v.version} ${v.patente}`.toUpperCase();
      if (!hay.includes(texto)) return false;
    }
    if (marca && v.marca !== marca) return false;
    if (combustible && v.combustible !== combustible) return false;
    if (transmision && v.transmision !== transmision) return false;
    if (propiedad && v.propiedad !== propiedad) return false;
    const precio = Number(v.precio)||0;
    if (precio < pMin || precio > pMax) return false;
    return true;
  });

  out.sort((a,b)=>{
    if (orden === 'precio_asc') return (Number(a.precio)||0) - (Number(b.precio)||0);
    if (orden === 'precio_desc') return (Number(b.precio)||0) - (Number(a.precio)||0);
    if (orden === 'km_asc') return (Number(a.km)||0) - (Number(b.km)||0);
    if (orden === 'dias_desc') return (Number(a.dias_stock)||0) - (Number(b.dias_stock)||0);
    if (orden === 'alfabetico') return `${a.marca} ${a.modelo}`.localeCompare(`${b.marca} ${b.modelo}`);
    return 0;
  });

  document.getElementById('conteo').textContent = `${out.length} vehículo${out.length===1?'':'s'} encontrado${out.length===1?'':'s'}`;
  renderLista(out);
  guardarPrefs();
}

function badgePropiedad(v){
  if (v.propiedad === 'propio') return `<span class="prop-badge" style="background:#4CAF5033;color:#4CAF50;">Propio</span>`;
  if (v.propiedad === 'consignado') return `<span class="prop-badge" style="background:#FF980033;color:#FF9800;">Consignado</span>`;
  return '';
}

function filaPublicado(v){
  const pub = v.publicado || {};
  const activos = Object.keys(pub).filter(k=>pub[k]);
  if (!activos.length) return '';
  return `<div class="pub-row">${activos.map(k=>`<span class="pub-dot" style="background:${PLATAFORMA_COLOR[k]||'#666'}">${PLATAFORMA_LABEL[k]||k}</span>`).join('')}</div>`;
}

function renderLista(out){
  const cont = document.getElementById('lista');
  cont.className = vista;
  if (!out.length){
    cont.innerHTML = `<div class="vacio">No hay vehículos que coincidan con la búsqueda.</div>`;
    return;
  }
  cont.innerHTML = out.map((v, i)=>{
    const foto = (v.fotos && v.fotos[0]) ? `<img src="${v.fotos[0]}" loading="lazy">` : `<div class="sinfoto">Sin foto</div>`;
    const colorEstado = ESTADO_COLOR[v.estado] || '#4CAF50';
    return `<div class="card" data-idx="${vehiculos.indexOf(v)}">
      <div class="foto">${foto}<span class="estado-badge" style="color:${colorEstado}">${v.estado||''}</span></div>
      <div class="info">
        <div class="titulo">${v.marca||''} ${v.modelo||''} ${v.version||''}</div>
        <div class="sub">Patente: ${v.patente||'-'} · Año: ${v.anio||'-'}</div>
        <div class="sub">${fmtKm(v.km)} · ${v.combustible||'-'} · ${v.transmision||'-'}</div>
        <div class="precio">${fmtPrecio(v.precio)}</div>
        ${badgePropiedad(v)}
        ${filaPublicado(v)}
      </div>
    </div>`;
  }).join('');

  [...cont.querySelectorAll('.card')].forEach(el=>{
    el.addEventListener('click', ()=> abrirDetalle(vehiculos[Number(el.dataset.idx)]));
  });
}

function guardarPrefs(){
  localStorage.setItem('ram_prefs', JSON.stringify({
    buscar: document.getElementById('buscar').value,
    fMarca: document.getElementById('fMarca').value,
    fCombustible: document.getElementById('fCombustible').value,
    fTransmision: document.getElementById('fTransmision').value,
    fPropiedad: document.getElementById('fPropiedad').value,
    fOrden: document.getElementById('fOrden').value,
    precioMin: document.getElementById('precioMin').value,
    precioMax: document.getElementById('precioMax').value,
  }));
}
function restaurarPrefs(){
  try{
    const p = JSON.parse(localStorage.getItem('ram_prefs')||'{}');
    if (p.buscar) document.getElementById('buscar').value = p.buscar;
    if (p.fMarca) document.getElementById('fMarca').value = p.fMarca;
    if (p.fCombustible) document.getElementById('fCombustible').value = p.fCombustible;
    if (p.fTransmision) document.getElementById('fTransmision').value = p.fTransmision;
    if (p.fPropiedad) document.getElementById('fPropiedad').value = p.fPropiedad;
    if (p.fOrden) document.getElementById('fOrden').value = p.fOrden;
    if (p.precioMin) document.getElementById('precioMin').value = p.precioMin;
    if (p.precioMax) document.getElementById('precioMax').value = p.precioMax;
  }catch(e){}
}

// --- Detalle / carrusel ---
function abrirDetalle(v){
  detalleActual = v;
  fotoIndex = 0;
  document.getElementById('dTitulo').textContent = `${v.marca||''} ${v.modelo||''} ${v.version||''}`.trim();
  document.getElementById('dSub').textContent = `Patente: ${v.patente||'-'}  ·  Año: ${v.anio||'-'}  ·  ID: ${v.id||'-'}`;
  document.getElementById('dPrecio').textContent = fmtPrecio(v.precio);

  const colorEstado = ESTADO_COLOR[v.estado] || '#4CAF50';
  let badges = `<span class="badge" style="background:${colorEstado}">${v.estado||''}</span>`;
  if (v.propiedad === 'propio') badges += `<span class="badge" style="background:#4CAF50">Propio</span>`;
  if (v.propiedad === 'consignado') badges += `<span class="badge" style="background:#FF9800">Consignado</span>`;
  const pub = v.publicado || {};
  Object.keys(pub).filter(k=>pub[k]).forEach(k=>{
    badges += `<span class="badge" style="background:${PLATAFORMA_COLOR[k]||'#666'}">${PLATAFORMA_LABEL[k]||k}</span>`;
  });
  document.getElementById('dBadges').innerHTML = badges;

  document.getElementById('dSpecs').innerHTML = `
    <div class="spec"><div class="label">Kilometraje</div><div class="valor">${fmtKm(v.km)}</div></div>
    <div class="spec"><div class="label">Combustible</div><div class="valor">${v.combustible||'-'}</div></div>
    <div class="spec"><div class="label">Transmisión</div><div class="valor">${v.transmision||'-'}</div></div>
    <div class="spec"><div class="label">Días en stock</div><div class="valor">${v.dias_stock ?? '-'}</div></div>
  `;

  renderFoto();
  document.getElementById('detalle').classList.add('abierto');
}

function renderFoto(){
  const fotos = (detalleActual && detalleActual.fotos) || [];
  const wrap = document.getElementById('fotoWrap');
  if (!fotos.length){
    wrap.innerHTML = `<div class="sinfoto">Sin fotos disponibles</div>`;
    document.getElementById('contadorFotos').textContent = '';
    document.getElementById('puntos').innerHTML = '';
    return;
  }
  if (fotoIndex < 0) fotoIndex = fotos.length - 1;
  if (fotoIndex >= fotos.length) fotoIndex = 0;
  wrap.innerHTML = `<img class="foto-actual" src="${fotos[fotoIndex]}">`;
  document.getElementById('contadorFotos').textContent = `${fotoIndex+1} / ${fotos.length}`;
  document.getElementById('puntos').innerHTML = fotos.map((_,i)=>`<span class="${i===fotoIndex?'on':''}"></span>`).join('');
}

document.getElementById('carrusel').addEventListener('touchstart', e=>{ touchStartX = e.touches[0].clientX; });
document.getElementById('carrusel').addEventListener('touchend', e=>{
  if (touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 40){
    fotoIndex += dx < 0 ? 1 : -1;
    renderFoto();
  }
  touchStartX = null;
});
document.getElementById('carrusel').addEventListener('click', e=>{
  if (e.target.id === 'btnCerrar') return;
  const rect = document.getElementById('carrusel').getBoundingClientRect();
  const x = e.clientX - rect.left;
  if (x > rect.width/2){ fotoIndex++; } else { fotoIndex--; }
  renderFoto();
});
document.getElementById('btnCerrar').addEventListener('click', e=>{
  e.stopPropagation();
  document.getElementById('detalle').classList.remove('abierto');
});

document.getElementById('btnVista').addEventListener('click', ()=>{
  vista = vista === 'list' ? 'grid' : 'list';
  localStorage.setItem('ram_vista', vista);
  aplicarFiltros();
});

['buscar','fMarca','fCombustible','fTransmision','fPropiedad','fOrden','precioMin','precioMax'].forEach(id=>{
  document.getElementById(id).addEventListener('input', aplicarFiltros);
  document.getElementById(id).addEventListener('change', aplicarFiltros);
});

// --- Init ---
document.getElementById('fechaGenerado').textContent = 'Actualizado: ' + (DATA.generado || '—') + `  ·  ${vehiculos.length} vehículos`;
initFiltros();
restaurarPrefs();
aplicarFiltros();

// Service Worker: guarda esta página en el teléfono para que abra sin internet
// una vez que se cargó al menos una vez con conexión.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
